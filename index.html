<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets 연동 투두 리스트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 투두 리스트</h1>
            <p class="subtitle">Google Sheets와 연동된 투두 리스트</p>
        </div>

        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="새로운 할일을 입력하세요..."
                autocomplete="off"
            >
            <button id="addBtn" class="add-btn">추가</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">모두</button>
            <button class="filter-btn" data-filter="active">진행중</button>
            <button class="filter-btn" data-filter="completed">완료됨</button>
        </div>

        <div class="stats">
            <span>전체: <strong id="totalCount">0</strong></span>
            <span>완료: <strong id="completedCount">0</strong></span>
            <span>남음: <strong id="remainingCount">0</strong></span>
        </div>

        <ul id="todoList" class="todo-list"></ul>

        <div class="actions">
            <button id="clearCompletedBtn" class="clear-btn">완료된 항목 삭제</button>
            <button id="syncBtn" class="sync-btn">🔄 동기화</button>
        </div>

        <div id="notification" class="notification"></div>
    </div>

    <script src="config.local.js"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
